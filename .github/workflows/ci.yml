# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when you push again to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; individual jobs widen this only if needed.
permissions:
  contents: read

jobs:
  rust:
    name: Rust lint & test
    # Pin to 22.04: build on the OLDEST system you support so you don't
    # accidentally raise the minimum glibc your binaries require.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 needs these system libs to compile on Linux.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy (warnings = errors)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    name: Frontend lint & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Audit JS dependencies
        run: npm audit --audit-level=high

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history to scan all commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependencies:
    name: Dependency policy (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: src-tauri/Cargo.toml

  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install semgrep
      # `--config auto` pulls community rulesets for Rust + JS/TS;
      # `--error` makes a finding fail the job.
      - run: semgrep scan --config auto --error